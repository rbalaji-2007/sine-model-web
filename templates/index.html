<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sine Model</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        color: #f8fafc;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .cont {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 3rem;
        border-radius: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        max-width: 450px;
        width: 90%;
        text-align: center;
      }

      h1 {
        font-size: 2.5rem;
        font-weight: 800;
        margin-top: 0;
        margin-bottom: 1rem;
        background: linear-gradient(to right, #38bdf8, #818cf8);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      #dis {
        background-color: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #fca5a5;
        border-radius: 12px;
        padding: 10px 16px;
        display: inline-block;
        font-size: 0.875rem;
        font-weight: 500;
        margin-bottom: 2rem;
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
        margin-bottom: 2rem;
      }

      input {
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.05);
        color: #ffffff;
        padding: 12px 16px;
        border-radius: 12px;
        width: 100%;
        max-width: 280px;
        height: auto;
        font-size: 1rem;
        transition: all 0.3s ease;
        box-sizing: border-box;
      }

      input:focus {
        outline: none;
        border-color: #6366f1;
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.25);
      }

      .btn-container {
        display: flex;
        gap: 10px;
        width: 100%;
        max-width: 280px;
        justify-content: center;
      }

      button {
        border: none;
        outline: none;
        background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
        color: white;
        padding: 12px 20px;
        font-weight: 600;
        font-size: 0.95rem;
        border-radius: 12px;
        cursor: pointer;
        flex: 1;
        transition: all 0.2s ease;
        box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
        filter: brightness(1.1);
      }

      button:active {
        transform: translateY(1px);
      }

      a {
        text-decoration: none;
        flex: 1;
      }

      a button {
        background: rgba(255, 255, 255, 0.08);
        color: #e2e8f0;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: none;
      }

      a button:hover {
        background: rgba(255, 255, 255, 0.15);
        color: #ffffff;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
      }

      h3 {
        font-size: 1.5rem;
        margin-top: 1.5rem;
        margin-bottom: 0.75rem;
        color: #38bdf8;
      }

      p {
        margin: 6px 0;
        font-size: 1.1rem;
      }

      p:contains("MODEL"),
      p:has(text) {
        font-weight: 500;
      }

      .error-msg {
        color: #ef4444;
        background: rgba(239, 68, 68, 0.1);
        padding: 10px;
        border-radius: 8px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="cont">
      <h1>Sine Model</h1>
      <p id="dis">NOTE: Model has only trained in the range 0 to 2𝛑</p>
      <form method="GET">
        <input type="text" name="inpt" placeholder="Enter radians..." />
        <div class="btn-container">
          <button type="submit">Calculate Result</button>
          <a href="/"><button type="button">Clear</button></a>
        </div>
      </form>

      {% if result %}
      <h3>sin({{ rad }})</h3>
      <p>(MODEL) {{ result }}</p>
      <p>(ACTUAL) {{ act }}</p>
      {% endif %}
      
      {% if error %}
      <p class="error-msg">ERROR: {{error}}</p>
      {% endif %}
      
    </div>
  </body>
</html>
